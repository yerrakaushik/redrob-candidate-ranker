  - "Antigravity IDE"

ai_usage_summary: |
  Used Gemini (via Antigravity IDE) for code generation, architectural discussion,
  and iterative refinement of the scoring heuristics. The ranking logic, scoring
  weights, and honeypot detection were designed through human engineering judgment.
  No candidate data was sent to any external LLM during the ranking process.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Multi-signal hybrid scoring engine with seven weighted dimensions: title fit (20%),
  skill match quality (25%), career trajectory analysis (20%), experience range (10%),
  behavioral engagement signals (15%), location fit (5%), and education (5%).
  
  Honeypot detection filters ~80 impossible profiles using timeline validation,
  expert-without-duration checks, and endorsement-trust analysis. Title-first gating
  prevents keyword-stuffer traps per JD guidance. Behavioral signals (response rate,
  recency, notice period) act as an availability multiplier. Reasoning is generated
  deterministically from profile facts with zero hallucination.
  
  Runtime: ~45 seconds for 100K candidates on CPU. Memory: <2GB.

